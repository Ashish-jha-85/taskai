version: "3.9"

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskai-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskai-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: always

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: taskai-worker
    env_file:
      - ./worker/.env
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: taskai-redis
    ports:
      - "6379:6379"
    restart: always
